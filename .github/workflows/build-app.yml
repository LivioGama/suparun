name: Build Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Copy CLI into app
        run: |
          mkdir -p packages/app/cli
          cp packages/cli/suparun.sh packages/cli/vhost-proxy.ts packages/app/cli/

      - name: Build & package
        run: |
          cd packages/app
          bun run build
          npx electron-builder --mac --arm64 --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/app/dist/*.dmg
          generate_release_notes: true

      - name: Upload artifacts (manual runs)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: suparun-mac
          path: packages/app/dist/*.dmg
