name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions (patch)
        run: |
          bump() {
            local pkg="$1/package.json"
            node -e "
              const p = require('./$pkg');
              const v = p.version.split('.'); v[2]++; p.version = v.join('.');
              require('fs').writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\n');
              console.log(p.version);
            "
          }
          CLI_VERSION=$(bump packages/cli)
          bump packages/app > /dev/null

          git add -A
          git commit -m "chore: bump versions (cli@$CLI_VERSION)"
          git tag "v$CLI_VERSION"
          git push --follow-tags

      - name: Publish @suparun/cli
        run: cd packages/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @suparun/app
        run: cd packages/app && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
