appId: com.suparun.app
productName: Suparun
directories:
  buildResources: assets
  output: dist
files:
  - out/**/*
  - assets/**/*
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: assets/icon.icns
  darkModeSupport: true
  extendInfo:
    LSUIElement: true
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
